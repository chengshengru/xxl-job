# web port
server.port=8081
# no web
#spring.main.web-environment=false

# log config
logging.config=classpath:logback.xml


### schedule admin address list, such as "http://address" or "http://address01,http://address02"
schedule.admin.addresses=http://127.0.0.1:8080/schedule-admin
### schedule access token
schedule.admin.accessToken=default_token
### schedule timeout by second, default 3s
schedule.admin.timeout=3

### schedule executor enable, default true
schedule.executor.enabled=true
### schedule executor appname
schedule.executor.appname=schedule-executor-sample
### schedule executor registry-address: default use address to registry , otherwise use ip:port if address is null
schedule.executor.address=
### schedule executor server-info
schedule.executor.ip=
schedule.executor.port=9999
### schedule executor log-path
schedule.executor.logpath=/data/applogs/schedule/jobhandler
### schedule executor log-retention-days
schedule.executor.logretentiondays=30
### schedule executor excluded package, will skip scan job. such as "org.package01" or "org.package01,org.package02"
schedule.executor.excludedpackage=
